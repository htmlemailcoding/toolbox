<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Image Resizer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            text-align: left;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; color: #555; text-transform: uppercase; }
        input, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        input[type="file"] { margin: 10px 0; width: 100%; box-sizing: border-box; }
        .preview-box {
            margin: 20px 0;
            border: 1px solid #eee;
            padding: 15px;
            background: #fafafa;
            display: none;
            border-radius: 8px;
        }
        img { max-height: 250px; width: auto; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            transition: all 0.2s;
        }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.96); }
        .btn-blue { background-color: #007bff; }
        .btn-gray { background-color: #6c757d; }
        .btn-purple { background-color: #6f42c1; }
        .quality-info { font-size: 0.7rem; color: #999; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Image Resizer Pro</h2>
    
    <div class="settings-grid">
        <div class="input-group">
            <label>Width (px)</label>
            <input type="number" id="base-width" value="436">
        </div>
        <div class="input-group">
            <label>Format</label>
            <select id="format">
                <option value="image/jpeg">JPG</option>
                <option value="image/png">PNG</option>
                <option value="image/gif">GIF</option>
            </select>
        </div>
        <div class="input-group">
            <label>Quality (1-100)</label>
            <input type="number" id="quality" value="60" min="1" max="100">
            <span class="quality-info">JPG only</span>
        </div>
    </div>

    <input type="file" id="upload" accept="image/*">
    
    <div id="preview-container" class="preview-box">
        <img id="img-preview">
        <p id="file-info" style="font-size: 0.8rem; color: #666; margin-top: 10px;"></p>
    </div>

    <div id="controls" class="button-group" style="display: none;">
        <button id="btn-half" class="btn-gray">Scale 0.5</button>
        <button id="btn-full" class="btn-blue">Scale 1.0</button>
        <button id="btn-double" class="btn-purple">Scale 2.0</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const upload = document.getElementById('upload');
    const previewContainer = document.getElementById('preview-container');
    const imgPreview = document.getElementById('img-preview');
    const controls = document.getElementById('controls');
    const canvas = document.getElementById('canvas');
    
    let originalImage = new Image();
    let originalFileName = "image";

    upload.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Extract filename without extension
        originalFileName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;

        const reader = new FileReader();
        reader.onload = (event) => {
            originalImage.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    originalImage.onload = () => {
        imgPreview.src = originalImage.src;
        previewContainer.style.display = 'block';
        controls.style.display = 'grid';
        document.getElementById('file-info').innerText = `Original Size: ${originalImage.width}x${originalImage.height}px`;
    };

    function cleanFilename(name, scale, width, mime) {
        const ext = mime.split('/')[1].replace('jpeg', 'jpg');
        return name.toLowerCase()
            .replace(/[^a-z0-9]/g, '-')
            .replace(/-+/g, '-')
            .replace(/^-|-$/g, '') + `-w${width}-s${scale}.${ext}`;
    }

    function processAndDownload(scale) {
        const baseWidth = parseInt(document.getElementById('base-width').value) || 436;
        const formatMime = document.getElementById('format').value;
        const qualityInput = parseInt(document.getElementById('quality').value) || 60;
        
        const finalQuality = qualityInput / 100;
        const targetWidth = baseWidth * scale;
        const aspectRatio = originalImage.height / originalImage.width;
        const targetHeight = targetWidth * aspectRatio;

        canvas.width = targetWidth;
        canvas.height = targetHeight;

        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        // Fix for JPG: Canvas has a transparent background by default. 
        // If we save as JPG, transparency becomes black. Let's fill it with white.
        if (formatMime === 'image/jpeg') {
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        ctx.drawImage(originalImage, 0, 0, targetWidth, targetHeight);

        canvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = cleanFilename(originalFileName, scale, Math.round(targetWidth), formatMime);
            link.click();
            URL.revokeObjectURL(url);
        }, formatMime, finalQuality);
    }

    document.getElementById('btn-half').onclick = () => processAndDownload(0.5);
    document.getElementById('btn-full').onclick = () => processAndDownload(1);
    document.getElementById('btn-double').onclick = () => processAndDownload(2);
</script>

</body>
</html>
