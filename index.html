<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>App Index</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --accent:#4a90e2;
      --muted:#6b7280;
      --radius:12px;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    html,body{height:100%;margin:0;background:var(--bg);color:#111;}
    .wrap{
      max-width:1100px;margin:36px auto;padding:20px;
    }
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
    h1{margin:0;font-size:20px;}
    p.subtitle{margin:0;color:var(--muted);font-size:13px;}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:16px;
    }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:0 6px 18px rgba(17,24,39,0.06);
      text-decoration:none;color:inherit;
      display:flex;flex-direction:column;gap:12px;align-items:flex-start;
      transition:transform .14s ease, box-shadow .14s ease;
    }
    .card:hover{transform:translateY(-6px);box-shadow:0 12px 30px rgba(17,24,39,0.08);}
    .icon{
      width:56px;height:56px;border-radius:10px;
      display:inline-flex;align-items:center;justify-content:center;
      font-weight:700;color:white;background:linear-gradient(135deg,var(--accent),#7bb0ff);
      flex-shrink:0;
    }
    .meta{display:flex;align-items:center;gap:12px;width:100%;}
    .title{font-size:15px;font-weight:600;margin:0;}
    .desc{font-size:13px;color:var(--muted);margin:0;}
    footer{margin-top:20px;color:var(--muted);font-size:13px;text-align:center;}
    @media (max-width:420px){
      .icon{width:48px;height:48px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>My Apps</h1>
        <p class="subtitle">Click an app to open it.</p>
      </div>
      <div style="color:var(--muted);font-size:13px;">Simple index • quick access</div>
    </header>

<main class="grid">

</main>

</body>
</html>
