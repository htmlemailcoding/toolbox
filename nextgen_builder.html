
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Code Generator</title>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --copied: #343a40;
            --bg: #f0f2f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 850px;
            margin-bottom: 30px;
        }

        h2 { margin-top: 0; color: #1a212d; border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.25rem; }
        
        .settings-row {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        select, textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 120px;
            font-family: monospace;
            margin: 10px 0;
            box-sizing: border-box;
            outline-color: var(--primary);
        }
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            min-width: 140px;
        }

        .btn-gen { background: var(--primary); color: white; }
        .btn-gen:hover { background: #0056b3; }

        .btn-copy { background: var(--success); color: white; }
        .btn-copy.copied { background: var(--copied); }
        
        .output-box {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 6px;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            min-height: 40px;
            border: 1px solid #111;
        }
    </style>
</head>
<body>

<!-- VERSION 1 -->
<div class="card">
    <h2>Version 1: Full Table Wrapper</h2>
    <div class="settings-row">
        <label><strong>Select Font:</strong></label>
        <select id="font1">
            <option value="Arial, Helvetica, sans-serif">Arial</option>
            <option value="Verdana, Arial, Helvetica, sans-serif" selected>Verdana</option>
            <option value="Trebuchet MS, Arial, Helvetica, sans-serif">Trebuchet MS</option>
        </select>
    </div>
    <textarea id="input1" placeholder="Item 1&#10;Item 2"></textarea>
    <div class="controls">
        <button class="btn-gen" onclick="generate(1)">Generate Code</button>
        <button id="copyBtn1" class="btn-copy" onclick="copyText(1)">Copy Result</button>
    </div>
    <pre id="output1" class="output-box">Generated code will appear here...</pre>
</div>

<!-- VERSION 2 -->
<div class="card">
    <h2>Version 2: Single Row Format</h2>
    <div class="settings-row">
        <label><strong>Select Font:</strong></label>
        <select id="font2">
            <option value="Arial, Helvetica, sans-serif">Arial</option>
            <option value="Verdana, Arial, Helvetica, sans-serif" selected>Verdana</option>
            <option value="Trebuchet MS, Arial, Helvetica, sans-serif">Trebuchet MS</option>
        </select>
    </div>
    <textarea id="input2" placeholder="Item 1&#10;Item 2"></textarea>
    <div class="controls">
        <button class="btn-gen" onclick="generate(2)">Generate Code</button>
        <button id="copyBtn2" class="btn-copy" onclick="copyText(2)">Copy Result</button>
    </div>
    <pre id="output2" class="output-box">Generated code will appear here...</pre>
</div>

<script>
    function generate(version) {
        const input = document.getElementById(`input${version}`).value;
        const font = document.getElementById(`font${version}`).value;
        const items = input
  .split(/\n/)
  .filter(line => line.trim() !== "")
  .map(line => {
    const trimmed = line.replace(/\s+$/, ''); // remove trailing spaces
    return trimmed.replace(/ (?!.* )/, '&nbsp;'); // replace last remaining space
  });
        let result = "";

        items.forEach(item => {
            let template = "";
            const cleanItem = item.trim();

            if (version === 1) {
                template = `<tr><td class="pad-lr-32" align="center" valign="top"><table class="hund" width="350" border="0" align="center" cellpadding="0" cellspacing="0" role="presentation"><tr><td class="" align="left" valign="top" width="13" style="padding: 0px 0px 16px; font-family: ${font}; font-size: 13px; line-height: 16px; mso-line-height-rule:exactly; color: #1A212D; text-decoration: none; font-weight: normal;">&bull;</td><td class="" align="left" valign="top" style="padding: 0px 0px 16px; font-family: ${font}; font-size: 13px; line-height: 16px; mso-line-height-rule:exactly; color: #1A212D; text-decoration: none; font-weight: normal;">${cleanItem}</td></tr></table></td></tr>`;
            } else {
                template = `<tr><td class="" align="left" valign="top" width="14" style="padding: 0px 0px 16px; font-family: ${font}; font-size: 13px; line-height: 16px; mso-line-height-rule:exactly; color: #1A212D; text-decoration: none; font-weight: normal;">&bull;</td><td class="" align="left" valign="top" style="padding: 0px 0px 16px; font-family: ${font}; font-size: 13px; line-height: 16px; mso-line-height-rule:exactly; color: #1A212D; text-decoration: none; font-weight: normal;">${cleanItem}</td></tr>`;
            }
            result += template + "\n";
        });

        document.getElementById(`output${version}`).textContent = result.trim() || "Please enter items to generate code.";
    }

    function copyText(version) {
        const output = document.getElementById(`output${version}`);
        const btn = document.getElementById(`copyBtn${version}`);
        const text = output.textContent;

        if (!text || text.includes("appear here") || text.includes("Please enter")) return;

        navigator.clipboard.writeText(text).then(() => {
            const originalText = "Copy Result";
            btn.textContent = "Copied!";
            btn.classList.add("copied");

            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove("copied");
            }, 2000);
        });
    }
</script>

</body>
</html>
