<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Text Compare</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    select,
    button {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #222;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      height: 260px;
      resize: vertical;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      line-height: 1.5;
      font-family: Consolas, monospace;
      background: white;
    }

    .diff-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .panel {
      background: white;
      border-radius: 8px;
      border: 1px solid #ddd;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
      font-weight: bold;
    }

    .diff-content {
      padding: 14px;
      min-height: 350px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, monospace;
      font-size: 14px;
      line-height: 1.7;
    }

    .added {
      background: #d4f8d4;
      border-radius: 3px;
    }

    .removed {
      background: #ffd6d6;
      border-radius: 3px;
    }

    .line {
      display: block;
      margin-bottom: 2px;
    }

    .line-number {
      display: inline-block;
      width: 40px;
      opacity: 0.5;
      user-select: none;
    }

    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    @media (max-width: 900px) {
      .editor-grid,
      .diff-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Advanced Text Compare</h1>

    <div class="controls">
      <label for="granularity">Compare By:</label>

      <select id="granularity">
        <option value="line">Line</option>
        <option value="word" selected>Word</option>
        <option value="character">Character</option>
      </select>

      <button id="compareBtn">Compare</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-color" style="background:#ffd6d6;"></div>
        Removed
      </div>

      <div class="legend-item">
        <div class="legend-color" style="background:#d4f8d4;"></div>
        Added
      </div>
    </div>

    <div class="editor-grid">
      <textarea id="leftInput" placeholder="Original text..."></textarea>

      <textarea id="rightInput" placeholder="Updated text..."></textarea>
    </div>

    <div class="diff-grid">

      <div class="panel">
        <div class="panel-header">Original</div>
        <div id="leftDiff" class="diff-content"></div>
      </div>

      <div class="panel">
        <div class="panel-header">Updated</div>
        <div id="rightDiff" class="diff-content"></div>
      </div>

    </div>

  </div>

  <script>

    const compareBtn = document.getElementById("compareBtn");
    const clearBtn = document.getElementById("clearBtn");

    const leftInput = document.getElementById("leftInput");
    const rightInput = document.getElementById("rightInput");

    const leftDiff = document.getElementById("leftDiff");
    const rightDiff = document.getElementById("rightDiff");

    compareBtn.addEventListener("click", compareTexts);
    clearBtn.addEventListener("click", clearAll);

    function compareTexts() {

      const mode = document.getElementById("granularity").value;

      const leftText = leftInput.value;
      const rightText = rightInput.value;

      let leftTokens = [];
      let rightTokens = [];

      if (mode === "line") {

        leftTokens = leftText.split("\n");
        rightTokens = rightText.split("\n");

      } else if (mode === "word") {

        leftTokens = leftText.split(/(\s+)/);
        rightTokens = rightText.split(/(\s+)/);

      } else {

        leftTokens = leftText.split("");
        rightTokens = rightText.split("");

      }

      const diff = buildDiff(leftTokens, rightTokens);

      renderDiff(diff, mode);
    }

    function buildDiff(oldArr, newArr) {

      const matrix = [];

      for (let i = 0; i <= oldArr.length; i++) {

        matrix[i] = [];

        for (let j = 0; j <= newArr.length; j++) {
          matrix[i][j] = 0;
        }
      }

      for (let i = 1; i <= oldArr.length; i++) {

        for (let j = 1; j <= newArr.length; j++) {

          if (oldArr[i - 1] === newArr[j - 1]) {

            matrix[i][j] = matrix[i - 1][j - 1] + 1;

          } else {

            matrix[i][j] = Math.max(
              matrix[i - 1][j],
              matrix[i][j - 1]
            );

          }
        }
      }

      const result = [];

      let i = oldArr.length;
      let j = newArr.length;

      while (i > 0 && j > 0) {

        if (oldArr[i - 1] === newArr[j - 1]) {

          result.unshift({
            type: "same",
            left: oldArr[i - 1],
            right: newArr[j - 1]
          });

          i--;
          j--;

        } else if (matrix[i - 1][j] > matrix[i][j - 1]) {

          result.unshift({
            type: "removed",
            left: oldArr[i - 1],
            right: ""
          });

          i--;

        } else {

          result.unshift({
            type: "added",
            left: "",
            right: newArr[j - 1]
          });

          j--;
        }
      }

      while (i > 0) {

        result.unshift({
          type: "removed",
          left: oldArr[i - 1],
          right: ""
        });

        i--;
      }

      while (j > 0) {

        result.unshift({
          type: "added",
          left: "",
          right: newArr[j - 1]
        });

        j--;
      }

      return result;
    }

    function renderDiff(diff, mode) {

      leftDiff.innerHTML = "";
      rightDiff.innerHTML = "";

      if (mode === "line") {
        renderLineDiff(diff);
      } else {
        renderInlineDiff(diff);
      }
    }

    function renderInlineDiff(diff) {

      diff.forEach(part => {

        const leftSpan = document.createElement("span");
        const rightSpan = document.createElement("span");

        if (part.type === "removed") {
          leftSpan.className = "removed";
        }

        if (part.type === "added") {
          rightSpan.className = "added";
        }

        leftSpan.innerHTML = escapeHtml(part.left);
        rightSpan.innerHTML = escapeHtml(part.right);

        leftDiff.appendChild(leftSpan);
        rightDiff.appendChild(rightSpan);
      });
    }

    function renderLineDiff(diff) {

      let lineNumber = 1;

      diff.forEach(part => {

        const leftRow = document.createElement("div");
        const rightRow = document.createElement("div");

        leftRow.className = "line";
        rightRow.className = "line";

        const leftSpan = document.createElement("span");
        const rightSpan = document.createElement("span");

        if (part.type === "removed") {
          leftSpan.className = "removed";
        }

        if (part.type === "added") {
          rightSpan.className = "added";
        }

        leftSpan.innerHTML = escapeHtml(part.left);
        rightSpan.innerHTML = escapeHtml(part.right);

        leftRow.innerHTML =
          `<span class="line-number">${lineNumber}</span>`;

        rightRow.innerHTML =
          `<span class="line-number">${lineNumber}</span>`;

        leftRow.appendChild(leftSpan);
        rightRow.appendChild(rightSpan);

        leftDiff.appendChild(leftRow);
        rightDiff.appendChild(rightRow);

        lineNumber++;
      });
    }

    function clearAll() {

      leftInput.value = "";
      rightInput.value = "";

      leftDiff.innerHTML = "";
      rightDiff.innerHTML = "";
    }

    function escapeHtml(text) {

      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

  </script>

</body>
</html>
